name: Deploy

on:
  push:
    branches: [main]

# ── Secrets necesarios en GitHub → Settings → Secrets ────────────────────────
# SSH_HOST      IP o hostname del servidor
# SSH_USER      Usuario SSH (normalmente el usuario de Plesk)
# SSH_KEY       Clave privada SSH (contenido completo del archivo .pem / id_rsa)
# SSH_PORT      Puerto SSH (normalmente 22)
# FRONTEND_PATH Ruta al httpdocs del dominio: /var/www/vhosts/dominio.com/httpdocs
# CMS_PATH      Ruta al directorio cms:        /var/www/vhosts/dominio.com/cms

jobs:
  # ── 1. Frontend (HTML estático) ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir archivos estáticos al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          source:   "public/"
          target:   ${{ secrets.FRONTEND_PATH }}
          strip_components: 1   # elimina el prefijo "public/"

  # ── 2. CMS (Directus) ───────────────────────────────────────────────────
  deploy-cms:
    name: Deploy CMS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir archivos del CMS (sin node_modules ni .env)
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          source:   "cms/"
          target:   ${{ secrets.CMS_PATH }}
          strip_components: 1
          # Excluir lo que NO debe subir
          rm: false

      - name: Instalar dependencias y recargar PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            source ~/.bashrc
            cd ${{ secrets.CMS_PATH }}
            npm install --omit=dev
            npx directus database migrate:latest
            pm2 reload ecosystem.config.cjs --env production || pm2 start ecosystem.config.cjs --env production
            pm2 save
